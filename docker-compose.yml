services:
  database:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DATABASE_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DATABASE_NAME}
      MYSQL_USER: ${DATABASE_USER}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - database_pharmacy:/var/lib/mysql
    ports:
      - "${DATABASE_PORT}:3306"

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    environment:
      PMA_HOST: database
      PMA_USER: ${DATABASE_USER}
      PMA_PASSWORD: ${DATABASE_PASSWORD}
      MYSQL_USER:
      MYSQL_PASSWORD:
    ports:
      - "${PHPMYADMIN_PORT}:80"

  public-api:
    build:
      context: .
      dockerfile: ./pharmacy-api/docker-files/public-api.go.dockerfile
      args:
        MODULE_PATH: ${PUBLIC_API_MODULE_PATH}
        SERVICE_PATH: ${PUBLIC_API_SERVICE_PATH}
    ports:
      - "${PUBLIC_API_PORT}:8080"
    depends_on:
      - database
    volumes:
      - ./pharmacy-api/pharmacy-content:/public-api/shared/pharmacy-content
    environment:
      DB_HOST: database
      DB_PORT: ${DATABASE_PORT}
      DB_USER: ${DATABASE_USER}
      DB_PASSWORD: ${DATABASE_PASSWORD}
      DB_NAME: ${DATABASE_NAME}

      TZ: ${TZ}
  
  local-api:
    build:
      context: .
      dockerfile: ./pharmacy-api/docker-files/local-api.go.dockerfile
      args:
        MODULE_PATH: ${LOCAL_API_MODULE_PATH}
        SERVICE_PATH: ${LOCAL_API_SERVICE_PATH}
    ports:
      - "${LOCAL_API_PORT}:8080"
    depends_on:
      - database
    volumes:
        - ./pharmacy-api/pharmacy-content:/local-api/shared/pharmacy-content
    environment:
      DB_HOST: database
      DB_PORT: ${DATABASE_PORT}
      DB_USER: ${DATABASE_USER}
      DB_PASSWORD: ${DATABASE_PASSWORD}
      DB_NAME: ${DATABASE_NAME}

      ACCESSTOKEN_SECRET: ${ACCESSTOKEN_SECRET}
      REFRESHTOKEN_SECRET: ${REFRESHTOKEN_SECRET}

      CONTROL_PANEL_ADMIN_LOGIN: ${CONTROL_PANEL_ADMIN_LOGIN}
      CONTROL_PANEL_ADMIN_PASSWORD: ${CONTROL_PANEL_ADMIN_PASSWORD}

      TZ: ${TZ}

  public-frontend:
    build:
      context: .
      dockerfile: ./pharmacy-public-frontend/dockerfile
    ports:
      - "${PUBLIC_FRONTEND_PORT}:80"
    
  local-frontend:
    build:
      context: .
      dockerfile: ./pharmacy-local-frontend/dockerfile
    ports:
      - "${LOCAL_FRONTEND_PORT}:80"


volumes:
  database_pharmacy: