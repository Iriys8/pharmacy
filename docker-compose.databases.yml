name: pharmacy-databases

networks:
  external:
    driver: bridge
  internal:
    driver: bridge

services:
  database:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DATABASE_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DATABASE_NAME}
      MYSQL_USER: ${DATABASE_USER}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - database_pharmacy:/var/lib/mysql
    networks:
      - external
      - internal

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    environment:
      PMA_HOST: database
      PMA_USER: ${DATABASE_USER}
      PMA_PASSWORD: ${DATABASE_PASSWORD}
      MYSQL_USER:
      MYSQL_PASSWORD:
    ports:
      - "${PHPMYADMIN_PORT}:80"
    networks:
      - internal

  redis:
    image: redis:alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --port ${REDIS_PORT}
    volumes:
      - redis:/var/lib/redis
      - redis-config:/usr/local/etc/redis/redis.conf
    networks:
      - external
      - internal
  
  redis-adminer:
    image: redis/redisinsight
    ports:
      - "${REDISINSIGN_PORT}:5540"
    environment:
      RI_REDIS_PORT: ${REDIS_PORT}
      RI_REDIS_HOST: ${REDIS_HOST}
      RI_REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      - redis
    networks:
      - internal

volumes:
  database_pharmacy:
  redis:
  redis-config: